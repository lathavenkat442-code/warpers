
<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="application-name" content="Warper">
    <meta name="description" content="Tamil Accounting and Stock Management App">
    
    <title>Warper - Tamil Business Manager</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    
    <script>
      // Polyfill process for browser environment to prevent 'process is not defined' errors
      if (typeof process === 'undefined') {
        window.process = { env: {} };
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Mukta+Malar:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Mukta Malar', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: none; /* Prevents pull-to-refresh on Android wrapper */
        }
        .tamil-font {
            font-family: 'Mukta Malar', sans-serif;
        }
        /* Custom scrollbar for better mobile feel */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        /* Disable text selection for app-like feel */
        * {
            -webkit-touch-callout: none;
        }
        input, textarea {
            -webkit-touch-callout: default;
            user-select: text;
        }
        
        /* Global button touch feedback */
        button, .cursor-pointer {
            -webkit-tap-highlight-color: transparent;
        }
        button:active, .cursor-pointer:active {
            transform: scale(0.96) !important;
            opacity: 0.85 !important;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out !important;
        }

        /* Quick Dark Mode using CSS filters */
        html.dark {
            filter: invert(1) hue-rotate(180deg);
            background-color: #fff; /* Inverts to black */
        }
        html.dark img, html.dark video, html.dark canvas, html.dark .sidebar-container {
            filter: invert(1) hue-rotate(180deg);
        }
        /* Ensure images inside double-inverted containers don't get inverted again */
        html.dark .sidebar-container img {
            filter: none;
        }
    </style>
</head>
<body class="bg-gray-50 overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
